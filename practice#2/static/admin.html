<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Spy Among Us</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
h1 { margin-bottom: 16px; }
.controls { display: flex; gap: 12px; margin-bottom: 20px; }
.controls button {
    padding: 12px 24px; border: none; border-radius: 8px; font-size: 14px;
    font-weight: 600; cursor: pointer; color: white;
}
.btn-start { background: #2ecc71; }
.btn-start:hover { background: #27ae60; }
.btn-start:disabled { background: #555; cursor: not-allowed; }
.btn-reset { background: #3498db; }
.btn-reset:hover { background: #2980b9; }

.status-bar { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; padding: 12px 18px; background: #16213e; border-radius: 12px; font-size: 14px; }
.status-bar .item .label { color: #888; margin-right: 6px; font-size: 12px; }
.status-bar .item .value { color: #f1c40f; font-weight: 700; }

.panel { background: #16213e; border-radius: 12px; padding: 18px; margin-bottom: 16px; }
.panel h2 { margin-bottom: 12px; font-size: 15px; }

.team-list { display: flex; flex-wrap: wrap; gap: 8px; }
.team-badge { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; display: flex; gap: 6px; align-items: center; }
.team-badge.connected { background: #2ecc71; color: #fff; }
.team-badge.disconnected { background: #555; color: #aaa; }
.team-badge.spy { background: #e74c3c; color: #fff; }
.team-badge .ready { font-size: 10px; padding: 2px 6px; border-radius: 8px; }
.team-badge .ready.yes { background: rgba(255,255,255,0.3); }
.team-badge .ready.no { background: rgba(0,0,0,0.3); }

table { width: 100%; border-collapse: collapse; }
th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #333; font-size: 13px; }
th { color: #888; font-size: 11px; text-transform: uppercase; }

#log-box { height: 280px; overflow-y: auto; background: #0f3460; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 12px; line-height: 1.6; }
.log-entry { color: #aaa; }

.history-box { max-height: 240px; overflow-y: auto; background: #0f3460; border-radius: 8px; padding: 12px; font-size: 13px; }
.history-item { margin-bottom: 6px; }
.history-item .round-tag { display: inline-block; background: #555; color: #fff; padding: 1px 8px; border-radius: 10px; font-size: 11px; margin-right: 6px; }
.history-item .team { font-weight: 700; color: #3498db; }
.history-item.spy-speech .team { color: #e74c3c; }

.empty { color: #666; font-style: italic; text-align: center; padding: 16px; }
</style>
</head>
<body>
<h1>Spy Among Us — Admin Panel</h1>

<div class="controls">
    <button class="btn-start" id="btn-start" onclick="startGame()" disabled>Start Game</button>
    <button class="btn-reset" onclick="resetGame()">Reset</button>
</div>

<div class="status-bar">
    <div class="item"><span class="label">상태:</span><span class="value" id="game-status">waiting</span></div>
    <div class="item"><span class="label">라운드:</span><span class="value" id="round-num">-</span></div>
    <div class="item"><span class="label">카테고리:</span><span class="value" id="category">-</span></div>
    <div class="item"><span class="label">키워드:</span><span class="value" id="keyword">-</span></div>
    <div class="item"><span class="label">스파이:</span><span class="value" id="spy-team">-</span></div>
    <div class="item"><span class="label">현재 발화자:</span><span class="value" id="current-speaker">-</span></div>
</div>

<div class="panel">
    <h2>접속 팀 (4팀 이상 + 모두 프롬프트 제출 시 시작 가능)</h2>
    <div class="team-list" id="team-list"></div>
</div>

<div class="panel">
    <h2>발언 History</h2>
    <div class="history-box" id="history-box">
        <div class="empty">아직 발언이 없습니다.</div>
    </div>
</div>

<div class="panel">
    <h2>투표 현황</h2>
    <table>
        <thead><tr><th>투표한 팀</th><th>지목한 팀</th></tr></thead>
        <tbody id="votes-body"></tbody>
    </table>
    <div id="vote-counts" style="margin-top: 10px; font-size: 13px; color: #f1c40f;"></div>
</div>

<div class="panel">
    <h2>이벤트 로그</h2>
    <div id="log-box"></div>
</div>

<script>
let ws = null;
let lastSpy = null;

function connect() {
    const protocol = location.protocol === "https:" ? "wss:" : "ws:";
    ws = new WebSocket(`${protocol}//${location.host}/ws/admin`);
    ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.type === "state_update") onStateUpdate(data);
        else if (data.type === "log") addLog(data.message);
        else if (data.type === "speech") onSpeech(data);
        else if (data.type === "vote_results") onVoteResults(data);
        else if (data.type === "game_end") onGameEnd(data);
    };
    ws.onclose = () => setTimeout(connect, 2000);
}

function startGame() { ws.send(JSON.stringify({type: "admin_start"})); }
function resetGame() {
    if (confirm("정말 게임을 리셋하시겠습니까? 모든 팀의 프롬프트가 초기화됩니다.")) {
        ws.send(JSON.stringify({type: "admin_reset"}));
    }
}

function onStateUpdate(data) {
    document.getElementById("game-status").textContent = data.game_status;
    document.getElementById("round-num").textContent = data.round_num || "-";
    document.getElementById("category").textContent = data.category || "-";
    document.getElementById("keyword").textContent = data.keyword || "-";
    document.getElementById("spy-team").textContent = data.spy || "-";
    document.getElementById("current-speaker").textContent = data.current_speaker || "-";
    lastSpy = data.spy;

    // Teams
    const teamList = document.getElementById("team-list");
    teamList.innerHTML = "";
    const allReady = Object.values(data.teams).every(t => t.has_prompts && t.connected);
    const enoughTeams = Object.keys(data.teams).length >= 4;
    document.getElementById("btn-start").disabled = !(allReady && enoughTeams && data.game_status === "waiting");

    for (const [name, info] of Object.entries(data.teams)) {
        const badge = document.createElement("span");
        const isSpy = (data.spy === name);
        let classes = "team-badge ";
        if (isSpy) classes += "spy ";
        else classes += info.connected ? "connected " : "disconnected ";
        badge.className = classes;
        const readyClass = info.has_prompts ? "yes" : "no";
        const readyText = info.has_prompts ? "✓" : "✗";
        const spyTag = isSpy ? " 🕵 SPY" : "";
        badge.innerHTML = `${name}${spyTag} <span class="ready ${readyClass}">${readyText}</span>`;
        teamList.appendChild(badge);
    }

    // History
    renderHistory(data.history || []);

    // Votes
    const tbody = document.getElementById("votes-body");
    tbody.innerHTML = "";
    if (data.votes) {
        for (const [voter, voted] of Object.entries(data.votes)) {
            const tr = document.createElement("tr");
            tr.innerHTML = `<td>${escapeHtml(voter)}</td><td>${escapeHtml(voted)}</td>`;
            tbody.appendChild(tr);
        }
    }
    if (data.vote_counts && Object.keys(data.vote_counts).length > 0) {
        const counts = Object.entries(data.vote_counts).sort((a,b) => b[1]-a[1]);
        document.getElementById("vote-counts").textContent = "득표: " +
            counts.map(([t, c]) => `${t} (${c})`).join(", ");
    } else {
        document.getElementById("vote-counts").textContent = "";
    }
}

function renderHistory(h) {
    const box = document.getElementById("history-box");
    if (!h || h.length === 0) {
        box.innerHTML = '<div class="empty">아직 발언이 없습니다.</div>';
        return;
    }
    box.innerHTML = "";
    h.forEach((sp) => {
        const div = document.createElement("div");
        const isSpy = (sp.team === lastSpy);
        div.className = "history-item" + (isSpy ? " spy-speech" : "");
        div.innerHTML = `<span class="round-tag">R${sp.round}</span><span class="team">${escapeHtml(sp.team)}</span>: ${escapeHtml(sp.message)}`;
        box.appendChild(div);
    });
    box.scrollTop = box.scrollHeight;
}

function onSpeech(data) {
    // History updates via state_update; just log
}

function onVoteResults(data) {
    if (data.tie) addLog(`Vote TIE — Spy wins automatically.`);
    else addLog(`Suspected: ${data.suspected} (actual spy: ${data.actual_spy})`);
}

function onGameEnd(data) {
    addLog(`=== GAME END === Winner: ${data.winner}, Reason: ${data.reason}, Keyword: ${data.keyword}, Spy: ${data.spy}, Spy guess: ${data.spy_guess || "(none)"}`);
}

function addLog(msg) {
    const box = document.getElementById("log-box");
    const now = new Date().toLocaleTimeString();
    const div = document.createElement("div");
    div.className = "log-entry";
    div.textContent = `[${now}] ${msg}`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

function escapeHtml(s) {
    if (s === null || s === undefined) return "";
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

connect();
</script>
</body>
</html>
