<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Prisoner's Dilemma</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
h1 { margin-bottom: 20px; }
.controls { display: flex; gap: 12px; margin-bottom: 20px; }
.controls button {
    padding: 12px 24px; border: none; border-radius: 8px; font-size: 14px;
    font-weight: 600; cursor: pointer; color: white;
}
.btn-start { background: #2ecc71; }
.btn-start:hover { background: #27ae60; }
.btn-start:disabled { background: #555; cursor: not-allowed; }
.btn-stop { background: #e74c3c; }
.btn-stop:hover { background: #c0392b; }
.btn-reset { background: #3498db; }
.btn-reset:hover { background: #2980b9; }
.timer { font-size: 28px; font-weight: 700; color: #e94560; margin-bottom: 20px; font-variant-numeric: tabular-nums; }
.panel { background: #16213e; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
.panel h2 { margin-bottom: 12px; font-size: 16px; }
.team-list { display: flex; flex-wrap: wrap; gap: 8px; }
.team-badge {
    padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600;
}
.team-badge.connected { background: #2ecc71; color: #fff; }
.team-badge.disconnected { background: #555; color: #aaa; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #333; }
th { color: #888; font-size: 12px; text-transform: uppercase; }
#log-box { height: 300px; overflow-y: auto; background: #0f3460; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 13px; line-height: 1.6; }
.log-entry { color: #aaa; }
</style>
</head>
<body>
<h1>Admin Panel</h1>

<div class="controls">
    <button class="btn-start" id="btn-start" onclick="startGame()">Start Game</button>
    <button class="btn-stop" onclick="stopGame()">Stop Game</button>
    <button class="btn-reset" onclick="resetGame()">Reset</button>
</div>

<div class="timer" id="timer">--:--</div>

<div class="panel">
    <h2>Connected Teams</h2>
    <div class="team-list" id="team-list"></div>
</div>

<div class="panel">
    <h2>Active Calls</h2>
    <table>
        <thead><tr><th>Call</th><th>Teams</th><th>Elapsed</th></tr></thead>
        <tbody id="calls-body"></tbody>
    </table>
</div>

<div class="panel">
    <h2>Leaderboard</h2>
    <table>
        <thead><tr><th>#</th><th>Team</th><th>Score</th></tr></thead>
        <tbody id="lb-body"></tbody>
    </table>
</div>

<div class="panel">
    <h2>Event Log</h2>
    <div id="log-box"></div>
</div>

<script>
let ws = null;
let timerEnd = null;
let timerInterval = null;

function connect() {
    const protocol = location.protocol === "https:" ? "wss:" : "ws:";
    ws = new WebSocket(`${protocol}//${location.host}/ws/admin`);
    ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.type === "state_update") onStateUpdate(data);
        else if (data.type === "game_start") onGameStart(data);
        else if (data.type === "game_end") onGameEnd(data);
        else if (data.type === "log") addLog(data.message);
    };
    ws.onclose = () => setTimeout(connect, 2000);
}

function startGame() { ws.send(JSON.stringify({type: "admin_start"})); }
function stopGame() { ws.send(JSON.stringify({type: "admin_stop"})); }
function resetGame() { ws.send(JSON.stringify({type: "admin_reset"})); }

function onGameStart(data) {
    timerEnd = data.timer_end;
    startTimer();
    addLog("=== GAME STARTED ===");
}

function onGameEnd(data) {
    clearInterval(timerInterval);
    document.getElementById("timer").textContent = "FINISHED";
    addLog("=== GAME ENDED ===");
}

function onStateUpdate(data) {
    if (data.timer_end) timerEnd = data.timer_end;

    // Teams
    const teamList = document.getElementById("team-list");
    teamList.innerHTML = "";
    for (const [name, info] of Object.entries(data.teams)) {
        const badge = document.createElement("span");
        badge.className = `team-badge ${info.connected ? "connected" : "disconnected"}`;
        badge.textContent = `${name} (${info.status})`;
        teamList.appendChild(badge);
    }

    // Update start button
    const teamCount = Object.keys(data.teams).length;
    document.getElementById("btn-start").disabled = teamCount < 2 || data.game_status !== "waiting";

    // Active calls
    const callsBody = document.getElementById("calls-body");
    callsBody.innerHTML = "";
    data.active_calls.forEach(c => {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${c.call_id}</td><td>${c.caller} ↔ ${c.receiver}</td><td>${c.elapsed}s</td>`;
        callsBody.appendChild(tr);
    });

    // Leaderboard
    const lbBody = document.getElementById("lb-body");
    lbBody.innerHTML = "";
    data.leaderboard.forEach((entry, i) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${i+1}</td><td>${entry.team}</td><td>${entry.score}</td>`;
        lbBody.appendChild(tr);
    });
}

function addLog(msg) {
    const box = document.getElementById("log-box");
    const now = new Date().toLocaleTimeString();
    const div = document.createElement("div");
    div.className = "log-entry";
    div.textContent = `[${now}] ${msg}`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

function startTimer() {
    clearInterval(timerInterval);
    const el = document.getElementById("timer");
    timerInterval = setInterval(() => {
        const remaining = Math.max(0, timerEnd - Date.now() / 1000);
        const m = Math.floor(remaining / 60);
        const s = Math.floor(remaining % 60);
        el.textContent = `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
        if (remaining <= 0) { clearInterval(timerInterval); el.textContent = "00:00"; }
    }, 200);
}

connect();
</script>
</body>
</html>
